<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="none"/>

  <!-- square = 10 | gap = 4 | core = 6 -->

  <!-- Top Row -->
  <rect x="20" y="12" width="10" height="10" fill="#00F5FF"/>
  <rect x="34" y="12" width="10" height="10" fill="#00F5FF"/>

  <!-- Middle Row -->
  <rect x="13" y="26" width="10" height="10" fill="#00F5FF"/>

  <!-- Smaller Core (6x6 rotated, stroke only) -->
  <rect x="29" y="28" width="6" height="6"
        fill="none"
        stroke="#00F5FF"
        stroke-width="1.8"
        transform="rotate(45 32 31)"/>

  <rect x="41" y="26" width="10" height="10" fill="#00F5FF"/>

  <!-- Bottom Row -->
  <rect x="20" y="40" width="10" height="10" fill="#00F5FF"/>
  <rect x="34" y="40" width="10" height="10" fill="#00F5FF"/>

</svg>
